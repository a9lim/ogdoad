name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    # Lint both feature sets: the default pure-Rust core (what `cargo test`
    # builds) and the `python` feature (what the PyO3 bindings compile under).
    # The tree is kept warning-clean, so a warning in either is a failure.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo clippy --features python --all-targets -- -D warnings

  test:
    # The math core is pure Rust and the source of truth (AGENTS.md): no Python
    # in the loop. Run it on both platforms ogdoad is developed on. The property
    # suites (scalar_axioms / clifford_axioms) fuzz the ring + geometric-product
    # axioms here too.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  doc:
    # Rustdoc must run COLD with -D warnings. An incremental `cargo doc` only
    # re-checks what it recompiles, so it silently under-reports stale intra-doc
    # links in untouched modules (AGENTS.md). A fresh checkout is cold by
    # construction.
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps

  python:
    # Build the abi3 extension with maturin, install the wheel, and run the demo
    # tour. Display paths (blade / nimber / surreal rendering) don't surface in
    # `cargo test`, so the tour is the smoke test for the binding + Display
    # layer. If this is green the release workflow's wheel build can publish
    # blind.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - name: Build the abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          sccache: true
          manylinux: auto
      - name: Install the wheel and run the demo tour
        run: |
          pip install --find-links dist --no-index ogdoad
          python demo.py
